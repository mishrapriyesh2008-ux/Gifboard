name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle wrapper jar
        working-directory: SpotiBoard
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          cp /tmp/gradle-dist/gradle-8.9/lib/plugins/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar || \
          find /tmp/gradle-dist -name "gradle-wrapper*.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: SpotiBoard
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GifBoard-debug
          path: SpotiBoard/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
